name: Upstream Emulator Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '7,37 * * * *'

permissions:
  contents: read

jobs:
  upstream:
    name: Upstream API ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        api-level: [21, 23, 26, 29, 31, 33, 35]

    steps:
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start emulator with upstream action
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          script: echo hello from upstream API ${{ matrix.api-level }}
